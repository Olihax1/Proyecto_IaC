services:
  sonarqube:
    image: sonarqube:10.6-community
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://db:5432/sonar
      SONAR_JDBC_USERNAME: ***
      SONAR_JDBC_PASSWORD: ***
    depends_on:
      - db
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ***
      POSTGRES_PASSWORD: ***
      POSTGRES_DB: sonar
    volumes:
      - sonar_db:/var/lib/postgresql/data
volumes:
  sonar_db: